<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YantraLive — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0a0b0d;
  --bg2:      #111318;
  --bg3:      #181c23;
  --border:   #242830;
  --border2:  #2e3440;
  --amber:    #f5a623;
  --amber2:   #ffbe4f;
  --amber-dim:#7a5210;
  --red:      #e05a4e;
  --green:    #4caf74;
  --text:     #dde2ec;
  --text2:    #8b93a6;
  --text3:    #5a6070;
  --mono:     'Space Mono', monospace;
  --sans:     'Barlow', sans-serif;
  --cond:     'Barlow Condensed', sans-serif;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-wrap {
  width: 100%;
  max-width: 380px;
  padding: 20px;
}

.login-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 32px;
  justify-content: center;
}
.logo-mark {
  width: 32px; height: 32px;
  background: var(--amber);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
}
.logo-name {
  font-family: var(--cond);
  font-weight: 800;
  font-size: 1.6rem;
  letter-spacing: 0.05em;
}
.logo-name span { color: var(--amber); }

.login-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 28px;
}
.login-title {
  font-family: var(--cond);
  font-weight: 800;
  font-size: 1.2rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}
.login-sub {
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--text3);
  letter-spacing: 0.1em;
  margin-bottom: 24px;
}

.form-group {
  margin-bottom: 16px;
}
.form-label {
  display: block;
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.82rem;
  border-radius: 3px;
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--amber-dim); }

.btn-login {
  width: 100%;
  padding: 12px;
  background: var(--amber);
  color: #000;
  border: none;
  border-radius: 3px;
  font-family: var(--cond);
  font-weight: 800;
  font-size: 1rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s;
  margin-top: 8px;
}
.btn-login:hover { background: var(--amber2); }
.btn-login:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }

.error-msg {
  display: none;
  margin-top: 12px;
  padding: 8px 12px;
  background: rgba(224,90,78,0.1);
  border: 1px solid rgba(224,90,78,0.3);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--red);
}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-mark"></div>
    <div class="logo-name">Yantra<span>Live</span></div>
  </div>

  <div class="login-card">
    <div class="login-title">Sign In</div>
    <div class="login-sub">CONTACT DATABASE</div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" id="username" autocomplete="username" placeholder="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="password" autocomplete="current-password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter') login()">
    </div>

    <button class="btn-login" id="btn-login" onclick="login()">Sign In</button>
    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

<script>
async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('error-msg');

  if (!username || !password) {
    err.textContent = 'Please enter username and password.';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  err.style.display = 'none';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    window.location.href = '/';
  } catch(e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}
</script>
</body>
</html>
