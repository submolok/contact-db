<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YantraLive — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.body.className = localStorage.getItem('theme') || 'light';
  });
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  body.dark {
  --bg:       #0a0b0d;
  --bg2:      #111318;
  --bg3:      #181c23;
  --border:   #242830;
  --border2:  #2e3440;
  --amber:    #f5a623;
  --amber2:   #ffbe4f;
  --amber-dim:#7a5210;
  --red:      #e05a4e;
  --green:    #4caf74;
  --blue:     #4a8fe8;
  --text:     #dde2ec;
  --text2:    #8b93a6;
  --text3:    #5a6070;
  --terminal-bg: #2a313f;
  --terminal-text: #8bc34a;
  }
  body.light {
  --bg:       #ffffff;
  --bg2:      #f4f5f7;
  --bg3:      #e8eaed;
  --border:   #d1d5db;
  --border2:  #b0b7c3;
  --amber:    #f5a623;
  --amber2:   #ffbe4f;
  --amber-dim:#7a5210;
  --red:      #e05a4e;
  --green:    #4caf74;
  --blue:     #4a8fe8;
  --text:     #111318;
  --text2:    #3a4050;
  --text3:    #6b7280;
  --terminal-bg: #1e2030;
  --terminal-text: #a6da95;
}
  --mono:     'Space Mono', monospace;
  --sans:     'Barlow', sans-serif;
  --cond:     'Barlow Condensed', sans-serif;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
}

/* topbar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 52px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.topbar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-mark {
  width: 28px; height: 28px;
  background: var(--amber);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
}
.logo-name {
  font-family: var(--cond);
  font-weight: 800;
  font-size: 1.3rem;
  letter-spacing: 0.05em;
}
.logo-name span { color: var(--amber); }
.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.topbar-user {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text3);
  letter-spacing: 0.1em;
}

/* buttons */
.btn {
  padding: 7px 16px;
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  border-radius: 2px;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: none;
  color: var(--text2);
  transition: all 0.15s;
}
.btn:hover { color: var(--text); border-color: var(--text3); }
.btn-primary {
  background: var(--amber);
  color: #000;
  border-color: var(--amber);
  font-weight: 700;
}
.btn-primary:hover { background: var(--amber2); border-color: var(--amber2); color: #000; }
.btn-danger { color: var(--red); border-color: transparent; }
.btn-danger:hover { border-color: var(--red); background: rgba(224,90,78,0.1); }

/* layout */
.page { max-width: 800px; margin: 0 auto; padding: 32px 24px; }
.page-title {
  font-family: var(--cond);
  font-weight: 800;
  font-size: 1.8rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.page-sub {
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--text3);
  letter-spacing: 0.1em;
  margin-bottom: 32px;
}

/* card */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 24px;
}
.card-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title {
  font-family: var(--cond);
  font-weight: 700;
  font-size: 1rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.card-body { padding: 20px; }

/* form */
.form-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: flex-end;
}
.form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 150px; }
.form-label {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
}
.form-input {
  padding: 8px 10px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.78rem;
  border-radius: 2px;
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--amber-dim); }
.form-select {
  padding: 8px 10px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: var(--mono);
  font-size: 0.78rem;
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

/* status */
.status-msg {
  display: none;
  margin-top: 10px;
  padding: 7px 12px;
  border-radius: 2px;
  font-family: var(--mono);
  font-size: 0.68rem;
}
.status-msg.success {
  background: rgba(76,175,116,0.1);
  border: 1px solid rgba(76,175,116,0.3);
  color: var(--green);
}
.status-msg.error {
  background: rgba(224,90,78,0.1);
  border: 1px solid rgba(224,90,78,0.3);
  color: var(--red);
}

/* user table */
.user-table { width: 100%; border-collapse: collapse; }
.user-table th {
  padding: 8px 12px;
  text-align: left;
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
}
.user-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 0.82rem;
  color: var(--text2);
}
.user-table tr:last-child td { border-bottom: none; }
.role-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 2px;
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.role-admin { background: rgba(245,166,35,0.12); color: var(--amber); border: 1px solid rgba(245,166,35,0.25); }
.role-user { background: rgba(139,147,166,0.1); color: var(--text3); border: 1px solid var(--border2); }
.admin-tab {
  padding: 8px 20px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text3);
  font-family: var(--cond);
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  position: relative;
  top: 1px;
  transition: color 0.15s, border-color 0.15s;
}
.admin-tab:hover { color: var(--text2); }
.admin-tab.active { color: var(--amber); border-bottom-color: var(--amber); }

.request-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 12px;
  overflow: hidden;
}
.request-card-header {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: background 0.1s;
}
.request-card-header:hover { background: var(--bg3); }
.request-card-body {
  display: none;
  padding: 14px 16px;
  border-top: 1px solid var(--border);
}
.request-card-body.open { display: block; }
.note-select-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 3px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.note-select-item:hover { border-color: var(--border2); }
.note-select-item.selected { border-color: var(--amber-dim); background: rgba(245,166,35,0.05); }
.note-select-item input { accent-color: var(--amber); flex-shrink: 0; margin-top: 2px; }

/* visibility toggle switch */
.vis-toggle {
  position: relative;
  display: inline-block;
  width: 36px;
  height: 20px;
  cursor: pointer;
}
.vis-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.vis-slider {
  position: absolute;
  inset: 0;
  background: var(--border2);
  border-radius: 20px;
  transition: background 0.2s;
}
.vis-slider::before {
  content: '';
  position: absolute;
  height: 14px;
  width: 14px;
  left: 3px;
  bottom: 3px;
  background: var(--text2);
  border-radius: 50%;
  transition: transform 0.2s, background 0.2s;
}
.vis-toggle input:checked + .vis-slider { background: var(--red); }
.vis-toggle input:checked + .vis-slider::before { transform: translateX(16px); background: #fff; }
.vis-row:hover { background: var(--bg3); }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">
    <div class="logo-mark"></div>
    <div class="logo-name">Yantra<span>Live</span></div>
  </div>
  <div class="topbar-right">
    <span class="topbar-user" id="current-user"></span>
    <a href="/" class="btn">← Dashboard</a>
    <button class="btn" onclick="logout()">⎋ Logout</button>
  </div>
</header>

<div class="page">
  <div class="page-title">Admin Panel</div>
  <div style="display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border)">
    <button class="admin-tab active" data-section="users" onclick="switchAdminTab('users')">Users</button>
    <button class="admin-tab" data-section="requests" onclick="switchAdminTab('requests')">
      Access Requests
      <span id="request-badge" style="display:none;background:var(--red);color:#fff;font-family:var(--mono);font-size:0.55rem;padding:1px 5px;border-radius:8px;margin-left:6px">0</span>
    </button>
    <button class="admin-tab" data-section="visibility" onclick="switchAdminTab('visibility')">Visibility</button>
  </div>
  <div class="page-sub">USER MANAGEMENT</div>

  <div id="section-users">
    <!-- create user -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Create User</div>
      </div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input class="form-input" type="text" id="new-username" placeholder="username">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" id="new-password" placeholder="••••••••">
          </div>
          <div class="form-group" style="flex:0;min-width:120px">
            <label class="form-label">Role</label>
            <select class="form-select" id="new-role">
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="createUser()" style="height:36px;align-self:flex-end">Create</button>
        </div>
        <div class="status-msg" id="create-status"></div>
      </div>
    </div>

    <!-- user list -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Users</div>
        <div style="display:flex;align-items:center;gap:12px">
          <span id="user-count" style="font-family:var(--mono);font-size:0.62rem;color:var(--text3)"></span>
          <a href="/api/admin/export" class="btn" download style="text-decoration:none">↓ Export DB</a>
        </div>
      </div>
      <div class="card-body" style="padding:0">
        <table class="user-table">
          <thead>
            <tr>
              <th>Username</th>
              <th>Role</th>
              <th>Created</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="user-list">
            <tr><td colspan="4" style="text-align:center;color:var(--text3);font-family:var(--mono);font-size:0.72rem;padding:24px">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ACCESS REQUESTS SECTION -->
  <div id="section-requests" style="display:none">
    <div class="card">
      <div class="card-header">
        <div class="card-title">Pending Access Requests</div>
        <span id="request-count" style="font-family:var(--mono);font-size:0.62rem;color:var(--text3)"></span>
      </div>
      <div class="card-body" id="requests-list">
        <div style="text-align:center;padding:24px;color:var(--text3);font-family:var(--mono);font-size:0.72rem">Loading…</div>
      </div>
    </div>
  </div>

  <!-- VISIBILITY SECTION -->
  <div id="section-visibility" style="display:none">
    <div class="card">
      <div class="card-header">
        <div class="card-title">Company Visibility</div>
        <span id="visibility-count" style="font-family:var(--mono);font-size:0.62rem;color:var(--text3)"></span>
      </div>
      <div class="card-body" style="padding-bottom:8px">
        <input
          class="form-input"
          type="text"
          id="visibility-search"
          placeholder="Search companies…"
          oninput="filterVisibilityList()"
          style="width:100%;margin-bottom:16px"
        >
        <div style="display:grid;grid-template-columns:1fr auto auto auto;gap:0;align-items:center;padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:3px 3px 0 0;margin-bottom:0">
          <span style="font-family:var(--mono);font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3)">Company</span>
          <span style="font-family:var(--mono);font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);text-align:center;min-width:90px">Hide Company</span>
          <span style="font-family:var(--mono);font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);text-align:center;min-width:100px">Hide Employees</span>
          <span style="font-family:var(--mono);font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);text-align:center;min-width:110px">Hide Contact Info</span>
        </div>
        <div id="visibility-list" style="border:1px solid var(--border);border-top:none;border-radius:0 0 3px 3px;max-height:520px;overflow-y:auto">
          <div style="text-align:center;padding:24px;color:var(--text3);font-family:var(--mono);font-size:0.72rem">Loading…</div>
        </div>
      </div>
    </div>
    <div class="status-msg" id="visibility-status" style="margin-top:-16px;margin-bottom:16px"></div>
  </div>
</div>

<script>

async function init() {
  const me = await fetch('/api/auth/me').then(r => r.json());
  if (!me.logged_in) { window.location.href = '/login'; return; }
  if (me.role !== 'admin') { window.location.href = '/'; return; }
  document.getElementById('current-user').textContent = me.username.toUpperCase();
  loadUsers();
  
  // check for pending requests to show badge
  const res = await fetch('/api/admin/access-requests');
  const requests = await res.json();
  if (requests.length > 0) {
    const badge = document.getElementById('request-badge');
    badge.textContent = requests.length;
    badge.style.display = 'inline';
  }
}

async function loadUsers() {
  const res = await fetch('/api/admin/users');
  const users = await res.json();
  document.getElementById('user-count').textContent = `${users.length} user${users.length !== 1 ? 's' : ''}`;
  const tbody = document.getElementById('user-list');
  if (!users.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text3);font-family:var(--mono);font-size:0.72rem;padding:24px">No users.</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td style="color:var(--text);font-weight:500">${esc(u.username)}</td>
      <td><span class="role-badge role-${u.role}">${u.role}</span></td>
      <td style="font-family:var(--mono);font-size:0.7rem">${u.created_at.split('T')[0]}</td>
      <td style="text-align:right">
        <button class="btn btn-danger" onclick="deleteUser(${u.id}, '${esc(u.username)}')">Delete</button>
      </td>
    </tr>
  `).join('');
}

async function createUser() {
  const username = document.getElementById('new-username').value.trim();
  const password = document.getElementById('new-password').value;
  const role = document.getElementById('new-role').value;
  const status = document.getElementById('create-status');

  if (!username || !password) {
    showStatus('create-status', 'error', 'Username and password are required.');
    return;
  }

  const res = await fetch('/api/admin/users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password, role })
  });
  const data = await res.json();

  if (!res.ok) {
    showStatus('create-status', 'error', data.error || 'Failed to create user.');
    return;
  }

  showStatus('create-status', 'success', `User "${username}" created.`);
  document.getElementById('new-username').value = '';
  document.getElementById('new-password').value = '';
  loadUsers();
}

async function deleteUser(id, username) {
  if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
  const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (!res.ok) {
    alert(data.error);
    return;
  }
  loadUsers();
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login';
}

function showStatus(id, type, msg) {
  const el = document.getElementById(id);
  el.className = `status-msg ${type}`;
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

function switchAdminTab(section) {
  document.querySelectorAll('.admin-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.section === section);
  });
  document.getElementById('section-users').style.display = section === 'users' ? 'block' : 'none';
  document.getElementById('section-requests').style.display = section === 'requests' ? 'block' : 'none';
  document.getElementById('section-visibility').style.display = section === 'visibility' ? 'block' : 'none';
  if (section === 'requests') loadAccessRequests();
  if (section === 'visibility') loadVisibility();
}

let _allVisibilityCompanies = [];

async function loadVisibility() {
  const container = document.getElementById('visibility-list');
  container.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text3);font-family:var(--mono);font-size:0.72rem">Loading…</div>';

  const res = await fetch('/api/admin/companies/visibility');
  _allVisibilityCompanies = await res.json();

  document.getElementById('visibility-count').textContent = `${_allVisibilityCompanies.length} companies`;
  renderVisibilityList(_allVisibilityCompanies);
}

function filterVisibilityList() {
  const q = document.getElementById('visibility-search').value.toLowerCase();
  const filtered = q
    ? _allVisibilityCompanies.filter(c => c.name.toLowerCase().includes(q))
    : _allVisibilityCompanies;
  renderVisibilityList(filtered);
}

function renderVisibilityList(companies) {
  const container = document.getElementById('visibility-list');
  if (!companies.length) {
    container.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text3);font-family:var(--mono);font-size:0.72rem">No companies found.</div>';
    return;
  }
  container.innerHTML = companies.map(c => `
    <div class="vis-row" data-id="${c.id}" style="display:grid;grid-template-columns:1fr auto auto auto;gap:0;align-items:center;padding:10px 10px;border-bottom:1px solid var(--border);transition:background 0.1s">
      <div>
        <div style="font-size:0.85rem;color:var(--text);font-weight:500">${esc(c.name)}</div>
        ${c.hide_company || c.hide_employees || c.hide_contact_info ? `<div style="margin-top:3px">${
          c.hide_company ? '<span style="font-family:var(--mono);font-size:0.55rem;padding:1px 6px;border-radius:8px;background:rgba(224,90,78,0.12);color:var(--red);border:1px solid rgba(224,90,78,0.25);margin-right:4px">hidden</span>' : ''
        }${
          c.hide_employees ? '<span style="font-family:var(--mono);font-size:0.55rem;padding:1px 6px;border-radius:8px;background:rgba(245,166,35,0.1);color:var(--amber);border:1px solid rgba(245,166,35,0.2);margin-right:4px">employees</span>' : ''
        }${
          c.hide_contact_info ? '<span style="font-family:var(--mono);font-size:0.55rem;padding:1px 6px;border-radius:8px;background:rgba(74,143,232,0.1);color:var(--blue);border:1px solid rgba(74,143,232,0.2)">contacts</span>' : ''
        }</div>` : ''}
      </div>
      <div style="text-align:center;min-width:90px">
        <label class="vis-toggle" title="Hide this company from all non-admin users">
          <input type="checkbox" ${c.hide_company ? 'checked' : ''} onchange="saveVisibility(${c.id})">
          <span class="vis-slider"></span>
        </label>
      </div>
      <div style="text-align:center;min-width:100px">
        <label class="vis-toggle" title="Hide employee list when company is expanded">
          <input type="checkbox" ${c.hide_employees ? 'checked' : ''} onchange="saveVisibility(${c.id})">
          <span class="vis-slider"></span>
        </label>
      </div>
      <div style="text-align:center;min-width:110px">
        <label class="vis-toggle" title="Hide all phone/email contact info">
          <input type="checkbox" ${c.hide_contact_info ? 'checked' : ''} onchange="saveVisibility(${c.id})">
          <span class="vis-slider"></span>
        </label>
      </div>
    </div>
  `).join('');
}

async function saveVisibility(companyId) {
  const row = document.querySelector(`.vis-row[data-id="${companyId}"]`);
  const checkboxes = row.querySelectorAll('input[type="checkbox"]');
  const [hide_company, hide_employees, hide_contact_info] = [...checkboxes].map(cb => cb.checked);

  const res = await fetch(`/api/company/${companyId}/visibility`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ hide_company, hide_employees, hide_contact_info })
  });

  if (res.ok) {
    // Update local data
    const entry = _allVisibilityCompanies.find(c => c.id === companyId);
    if (entry) {
      entry.hide_company = hide_company;
      entry.hide_employees = hide_employees;
      entry.hide_contact_info = hide_contact_info;
    }
    // Re-render just this row's badges
    const q = document.getElementById('visibility-search').value.toLowerCase();
    const filtered = q ? _allVisibilityCompanies.filter(c => c.name.toLowerCase().includes(q)) : _allVisibilityCompanies;
    renderVisibilityList(filtered);
    showStatus('visibility-status', 'success', 'Visibility updated.');
  } else {
    showStatus('visibility-status', 'error', 'Failed to update visibility.');
  }
}

async function loadAccessRequests() {
  const container = document.getElementById('requests-list');
  container.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text3);font-family:var(--mono);font-size:0.72rem">Loading…</div>';

  const res = await fetch('/api/admin/access-requests');
  const requests = await res.json();

  document.getElementById('request-count').textContent = `${requests.length} pending`;
  const badge = document.getElementById('request-badge');
  if (requests.length > 0) {
    badge.textContent = requests.length;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }

  if (!requests.length) {
    container.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text3);font-family:var(--mono);font-size:0.72rem">No pending requests.</div>';
    return;
  }

  container.innerHTML = requests.map(r => `
    <div class="request-card" id="req-${r.id}">
      <div class="request-card-header" onclick="toggleRequest(${r.id}, ${r.person_id})">
        <div>
          <div style="font-family:var(--cond);font-weight:700;font-size:1rem;color:var(--text)">${esc(r.requester)}</div>
          <div style="font-family:var(--mono);font-size:0.62rem;color:var(--text3);margin-top:2px">
            Requesting access to <span style="color:var(--blue)">${esc(r.person_name)}</span> · ${esc(r.company_name)}
          </div>
          <div style="font-family:var(--mono);font-size:0.58rem;color:var(--text3);margin-top:2px">${r.created_at.split('T')[0]}</div>
        </div>
        <span style="color:var(--text3);font-size:0.8rem" id="req-arrow-${r.id}">▶</span>
      </div>
      <div class="request-card-body" id="req-body-${r.id}">
        <div style="font-family:var(--mono);font-size:0.6rem;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px">Select notes to share</div>
        <div id="req-notes-${r.id}">
          <div style="color:var(--text3);font-family:var(--mono);font-size:0.7rem">Loading notes…</div>
        </div>
        <div style="display:flex;gap:8px;margin-top:14px">
          <button onclick="resolveRequest(${r.id}, 'approve')" class="btn btn-primary" style="flex:1">✓ Approve</button>
          <button onclick="resolveRequest(${r.id}, 'deny')" class="btn btn-danger" style="flex:1;border:1px solid rgba(224,90,78,0.3)">✕ Deny</button>
        </div>
      </div>
    </div>
  `).join('');
}

async function toggleRequest(requestId, personId) {
  const body = document.getElementById(`req-body-${requestId}`);
  const arrow = document.getElementById(`req-arrow-${requestId}`);
  const isOpen = body.classList.contains('open');

  if (isOpen) {
    body.classList.remove('open');
    arrow.textContent = '▶';
    return;
  }

  body.classList.add('open');
  arrow.textContent = '▼';

  // load admin notes for this person
  const notesContainer = document.getElementById(`req-notes-${requestId}`);
  const res = await fetch(`/api/admin/access-requests/${requestId}/notes`);
  const notes = await res.json();

  if (!notes.length) {
    notesContainer.innerHTML = '<div style="color:var(--text3);font-family:var(--mono);font-size:0.7rem">No admin notes for this person.</div>';
    return;
  }

  notesContainer.innerHTML = notes.map(n => `
    <div class="note-select-item" id="note-item-${requestId}-${n.id}" onclick="toggleNoteSelect(${requestId}, ${n.id})">
      <input type="checkbox" id="note-check-${requestId}-${n.id}" onclick="event.stopPropagation()">
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-family:var(--mono);font-size:0.6rem;color:var(--amber)">${esc(n.username)}</span>
          <span style="font-family:var(--mono);font-size:0.58rem;color:var(--text3)">${n.created_at.split('T')[0]}</span>
        </div>
        <div style="font-size:0.82rem;color:var(--text2);line-height:1.4">${esc(n.note)}</div>
      </div>
    </div>
  `).join('');
}

function toggleNoteSelect(requestId, noteId) {
  const item = document.getElementById(`note-item-${requestId}-${noteId}`);
  const checkbox = document.getElementById(`note-check-${requestId}-${noteId}`);
  checkbox.checked = !checkbox.checked;
  item.classList.toggle('selected', checkbox.checked);
}

async function resolveRequest(requestId, action) {
  const noteIds = action === 'approve'
    ? [...document.querySelectorAll(`[id^="note-check-${requestId}-"]`)]
        .filter(cb => cb.checked)
        .map(cb => parseInt(cb.id.split('-').pop()))
    : [];

  if (action === 'approve' && noteIds.length === 0) {
    alert('Please select at least one note to share.');
    return;
  }

  const res = await fetch(`/api/admin/access-requests/${requestId}/resolve`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, note_ids: noteIds })
  });

  if (!res.ok) {
    alert('Error resolving request');
    return;
  }

  document.getElementById(`req-${requestId}`).remove();
  loadAccessRequests();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
